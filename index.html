<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדכון בחירת קבלן - מרפסות</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);padding:20px;min-height:100vh;color:#2c3e50}.container{max-width:600px;margin:0 auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.1)}.header{background:linear-gradient(135deg,#1a472a,#2d6a4f);color:white;padding:40px 30px;text-align:center;border-bottom:4px solid #d4a574}.header h1{font-size:28px;font-weight:700;margin-bottom:8px}.header .subtitle{font-size:13px;opacity:0.9;font-weight:500}.date-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-top:12px}.section{padding:30px;border-bottom:1px solid #eee}.section:last-child{border-bottom:none}.section-title{font-size:18px;font-weight:700;color:#1a472a;margin-bottom:16px;display:flex;align-items:center;gap:10px}.section-title::before{content:'';width:4px;height:24px;background:#d4a574;border-radius:2px}.deadline{background:#fff3cd;color:#856404;padding:15px;border-radius:6px;margin-bottom:20px;font-weight:500}.form-group{margin-bottom:20px}.form-group label{display:block;font-weight:600;margin-bottom:10px;color:#1a472a;font-size:14px}.radio-group{display:flex;gap:20px;margin-bottom:20px}.radio-item{display:flex;align-items:center;gap:8px;cursor:pointer}.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:inherit;direction:rtl}.form-group input:focus{outline:none;border-color:#1a472a;box-shadow:0 0 0 3px rgba(26,71,42,0.1)}.submit-btn{background:linear-gradient(135deg,#1a472a,#2d6a4f);color:white;padding:14px;border:none;border-radius:6px;font-weight:700;font-size:15px;cursor:pointer;transition:all 0.3s ease;width:100%;box-shadow:0 4px 12px rgba(26,71,42,0.2)}.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(26,71,42,0.3)}.submit-btn:disabled{opacity:0.7;cursor:not-allowed}.message{padding:12px;border-radius:6px;text-align:center;font-weight:600;margin-top:15px;display:none}.success-message{background:#d4edda;color:#155724}.error-message{background:#f8d7da;color:#721c24}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ עדכון בחירת קבלן</h1>
            <div class="subtitle">פרויקט מרפסות - הרחבה ושיפור</div>
            <div class="date-badge">15 במאי 2026</div>
        </div>

        <div class="content">
            <div class="section">
                <div class="deadline">⏰ <strong>תאריך אחרון להשבה: 24 במאי 2026</strong></div>
                <div class="section-title">📋 טופס הנתונים</div>
                <p style="font-size:14px;color:#2c3e50;margin-bottom:20px;line-height:1.6">אנא מלאו את הטופס שלהלן כדי להודיע האם אתם מעוניינים בהשתתפות בפרויקט המרפסות.</p>

                <form id="marpreset-form">
                    <div class="form-group">
                        <label>👤 האם אתם מעוניינים בהשתתפות בפרויקט?</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="choice" value="מעוניין" required>
                                <span>✓ כן, אני מעוניין</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="choice" value="לא מעוניין" required>
                                <span>✗ לא, אני לא מעוניין</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>📝 שם מלא <span style="color:#c1272d">*</span></label>
                        <input type="text" name="fullname" placeholder="הכניסו את שמכם המלא" required>
                    </div>

                    <div class="form-group">
                        <label>📞 מספר טלפון <span style="color:#c1272d">*</span></label>
                        <input type="tel" name="phone" placeholder="050-1234567" required>
                    </div>

                    <button type="submit" class="submit-btn">📤 שלח תגובה</button>
                    <div id="success-message" class="message success-message">✓ התגובה שלכם התקבלה בהצלחה! תודה רבה.</div>
                    <div id="error-message" class="message error-message">⚠️ אירעה שגיאה בשליחה. אנא נסו שוב.</div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // הסרת הגנת סיסמה - כל אחד יכול לגשת
        document.getElementById('marpreset-form').addEventListener('submit', function(e){
            e.preventDefault();
            const choice = document.querySelector('input[name="choice"]:checked').value;
            const fullname = document.querySelector('input[name="fullname"]').value;
            const phone = document.querySelector('input[name="phone"]').value;
            const timestamp = new Date().toLocaleString('he-IL');
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ שולח...';

            fetch('https://formspree.io/f/xjkqvqrd', {
                method: 'POST',
                body: JSON.stringify({
                    'בחירה': choice,
                    'שם מלא': fullname,
                    'מספר טלפון': phone,
                    'תאריך וזמן': timestamp
                }),
                headers: {'Content-Type': 'application/json'}
            })
            .then(response => {
                if(response.ok){
                    document.getElementById('success-message').style.display = 'block';
                    document.getElementById('error-message').style.display = 'none';
                    this.reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = '📤 שלח תגובה';
                    setTimeout(() => {document.getElementById('success-message').style.display = 'none'}, 5000);
                }else{throw new Error('Error');}
            })
            .catch(error => {
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('success-message').style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 שלח תגובה';
            });
        });
    </script>
</body>
</html>
